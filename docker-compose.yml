services:
  # FastAPI Server
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./audio_files:/app/audio_files
      - ./outputs:/app/outputs
    environment:
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_API_KEY=${APP_API_KEY}
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
